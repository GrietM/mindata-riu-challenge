spring.application.name=challenge

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.grietm.challenge.infrastructure.messaging.search.SearchMessage
spring.kafka.consumer.properties.spring.json.trusted.packages=com.grietm.challenge.infrastructure.messaging.search

app.kafka.search-topic=${KAFKA_SEARCH_TOPIC:hotel_availability_searches}
app.kafka.search-consumer-group-id=${KAFKA_SEARCH_CONSUMER_GROUP_ID:hotel-availability-searches-persistence}
app.kafka.consumer-enabled=${KAFKA_CONSUMER_ENABLED:false}

logging.level.org.apache.kafka=WARN
logging.level.org.springframework.kafka=INFO
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:mindata_riu_challenge}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
